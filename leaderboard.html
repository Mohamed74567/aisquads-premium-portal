<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard - AI Squads</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #fafafa; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .rank-top { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); }
    </style>
</head>
<body class="text-slate-900">
    <nav class="fixed top-0 w-full z-50 glass border-b border-slate-100">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-200">
                    <span class="text-white font-bold text-xl">A</span>
                </div>
                <span class="text-xl font-bold tracking-tight">AI SQUADS</span>
            </div>
            <div class="hidden md:flex gap-8 text-sm font-semibold text-slate-500">
                <a href="index.html" class="hover:text-indigo-600 transition-colors">Dashboard</a>
                <a href="cohort.html" class="hover:text-indigo-600 transition-colors">Cohort</a>
                <a href="bounties.html" class="hover:text-indigo-600 transition-colors">Bounties</a>
                <a href="badges.html" class="hover:text-indigo-600 transition-colors">Badges</a>
            </div>
            <div class="w-10 h-10 rounded-full bg-slate-100 border-2 border-white shadow-sm"></div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 pt-32 pb-20">
        <header class="mb-16 text-center">
            <h1 class="text-5xl font-bold mb-4 tracking-tight">Top Performers</h1>
            <p class="text-slate-500 text-lg mx-auto max-w-2xl">The most active and skilled agents in the current cohort.</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-16 items-end">
            <div class="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm text-center h-64 flex flex-col justify-center">
                <div class="text-2xl mb-2">🥈</div>
                <div class="w-16 h-16 bg-slate-100 rounded-full mx-auto mb-4 border-2 border-white shadow-sm"></div>
                <h3 class="font-bold text-lg">Sarah.ai</h3>
                <p class="text-indigo-600 font-bold">2,450 XP</p>
            </div>
            <div class="rank-top p-10 rounded-[3rem] shadow-2xl shadow-indigo-200 text-center text-white h-80 flex flex-col justify-center transform -translate-y-4">
                <div class="text-4xl mb-2">👑</div>
                <div class="w-20 h-20 bg-white/20 backdrop-blur-md rounded-full mx-auto mb-4 border-2 border-white/50 shadow-sm"></div>
                <h3 class="font-bold text-2xl">AlexDev</h3>
                <p class="text-white/80 font-bold text-lg">3,100 XP</p>
            </div>
            <div class="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm text-center h-56 flex flex-col justify-center">
                <div class="text-2xl mb-2">🥉</div>
                <div class="w-16 h-16 bg-slate-100 rounded-full mx-auto mb-4 border-2 border-white shadow-sm"></div>
                <h3 class="font-bold text-lg">JordanK</h3>
                <p class="text-indigo-600 font-bold">2,100 XP</p>
            </div>
        </div>

        <div class="bg-white rounded-[2.5rem] border border-slate-100 shadow-sm overflow-hidden">
            <table class="w-full text-left">
                <thead>
                    <tr class="border-b border-slate-50">
                        <th class="px-8 py-6 text-xs font-bold uppercase tracking-wider text-slate-400">Rank</th>
                        <th class="px-8 py-6 text-xs font-bold uppercase tracking-wider text-slate-400">Member</th>
                        <th class="px-8 py-6 text-xs font-bold uppercase tracking-wider text-slate-400">Status</th>
                        <th class="px-8 py-6 text-xs font-bold uppercase tracking-wider text-slate-400 text-right">XP</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-50">
                    <tr>
                        <td class="px-8 py-6 font-bold text-slate-400">#4</td>
                        <td class="px-8 py-6 flex items-center gap-4">
                            <div class="w-10 h-10 bg-slate-50 rounded-full"></div>
                            <span class="font-bold">Emma_Watson</span>
                        </td>
                        <td class="px-8 py-6"><span class="px-3 py-1 bg-green-50 text-green-600 rounded-full text-[10px] font-bold uppercase">Pro</span></td>
                        <td class="px-8 py-6 text-right font-bold">1,850</td>
                    </tr>
                    <tr>
                        <td class="px-8 py-6 font-bold text-slate-400">#5</td>
                        <td class="px-8 py-6 flex items-center gap-4">
                            <div class="w-10 h-10 bg-slate-50 rounded-full"></div>
                            <span class="font-bold">Liam.eth</span>
                        </td>
                        <td class="px-8 py-6"><span class="px-3 py-1 bg-blue-50 text-blue-600 rounded-full text-[10px] font-bold uppercase">Active</span></td>
                        <td class="px-8 py-6 text-right font-bold">1,700</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
</body>
</html>
